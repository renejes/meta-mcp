<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12141a"/>
      <stop offset="1" stop-color="#0d0f13"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" rx="20" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="399" rx="20" fill="none" stroke="#272d38"/>

  <!-- Left: wordmark + tagline + status -->
  <g transform="translate(72, 132)">
    <rect x="0" y="-34" width="46" height="46" rx="12" fill="url(#brand)"/>
    <!-- hub glyph -->
    <g stroke="#ffffff" stroke-width="2.4" stroke-linecap="round">
      <circle cx="23" cy="-11" r="4.5" fill="#ffffff" stroke="none"/>
      <line x1="23" y1="-11" x2="9"  y2="-25"/>
      <line x1="23" y1="-11" x2="37" y2="-25"/>
      <line x1="23" y1="-11" x2="9"  y2="3"/>
      <line x1="23" y1="-11" x2="37" y2="3"/>
    </g>
    <text x="62" y="6" font-size="46" font-weight="700" fill="#e7e9ef" letter-spacing="-1">Meta-MCP</text>
    <text x="2" y="58" font-size="20" fill="#98a1b1">One endpoint for Claude. Every MCP server behind it.</text>

    <g transform="translate(2, 92)">
      <rect x="0" y="0" width="232" height="34" rx="17" fill="#1b1f28" stroke="#272d38"/>
      <circle cx="20" cy="17" r="5" fill="#34d399"/>
      <text x="34" y="22" font-size="14" fill="#98a1b1" font-family="ui-monospace, Menlo, monospace">SSE · localhost:3663</text>
    </g>
  </g>

  <!-- Right: hub diagram (Claude ↔ Meta-MCP ↔ servers) -->
  <g transform="translate(640, 0)">
    <!-- connectors -->
    <g stroke="#39414f" stroke-width="2">
      <line x1="280" y1="92"  x2="280" y2="170"/>
      <line x1="280" y1="250" x2="160" y2="312"/>
      <line x1="280" y1="250" x2="280" y2="312"/>
      <line x1="280" y1="250" x2="400" y2="312"/>
    </g>

    <!-- Claude -->
    <g transform="translate(200, 52)">
      <rect width="160" height="40" rx="10" fill="#1b1f28" stroke="#39414f"/>
      <circle cx="22" cy="20" r="5" fill="#818cf8"/>
      <text x="38" y="25" font-size="15" fill="#e7e9ef" font-weight="600">Claude</text>
    </g>

    <!-- Meta-MCP hub -->
    <g transform="translate(190, 172)">
      <rect width="180" height="52" rx="13" fill="url(#brand)"/>
      <text x="90" y="32" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">Meta-MCP</text>
    </g>

    <!-- server chips -->
    <g font-size="13" fill="#cdd3df" text-anchor="middle">
      <g transform="translate(108, 312)">
        <rect width="104" height="36" rx="9" fill="#222734" stroke="#272d38"/>
        <text x="52" y="23">GitHub</text>
      </g>
      <g transform="translate(228, 312)">
        <rect width="104" height="36" rx="9" fill="#222734" stroke="#272d38"/>
        <text x="52" y="23">Postgres</text>
      </g>
      <g transform="translate(348, 312)">
        <rect width="104" height="36" rx="9" fill="#222734" stroke="#272d38"/>
        <text x="52" y="23">Files…</text>
      </g>
    </g>
  </g>
</svg>
